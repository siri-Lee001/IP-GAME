<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>__TITLE__</title>
    <style>
      :root{
        --bg:#0b0f14;
        --panel:rgba(255,255,255,.06);
        --text:#eef2ff;
        --muted:rgba(238,242,255,.75);
        --primary:#7c3aed;
        --primary2:#22c55e;
        --danger:#ef4444;
        --overlay-bg:#0f1723;
        --overlay-panel:#182231;
        --overlay-card:#223044;
        --overlay-text:#f4f7fc;
        --overlay-muted:#b8c5d8;
        --display-font:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong",serif;
        --ui-font:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC","Microsoft YaHei", sans-serif;
        --radius:16px;
        --shadow:0 18px 48px rgba(0,0,0,.42);
        --maxw:980px;
      }
      *{ box-sizing:border-box; }
      body{
        margin:0;
        min-height:100vh;
        color:var(--text);
        font-family:var(--ui-font);
        background:
          radial-gradient(900px 560px at 15% 0%, color-mix(in srgb, var(--primary) 35%, transparent), transparent 68%),
          radial-gradient(880px 540px at 90% 10%, color-mix(in srgb, var(--primary2) 24%, transparent), transparent 66%),
          var(--bg);
      }
      .shell{ width:min(var(--maxw), calc(100vw - 28px)); margin:0 auto; padding:18px 0 28px; }
      .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; transition:margin .24s ease, opacity .24s ease; }
      .brand{ min-width:0; transition:opacity .24s ease, transform .24s ease; }
      .brandTitle{ font-weight:950; font-size:18px; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .brandSub{ margin-top:3px; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
      button{
        cursor:pointer;
        border:1px solid rgba(255,255,255,.15);
        border-radius:12px;
        padding:10px 14px;
        font-weight:850;
        color:#f4f8ff;
        background:rgba(16,23,35,.62);
        backdrop-filter:blur(14px);
      }
      button:hover{ border-color:rgba(255,255,255,.28); background:rgba(28,39,57,.82); }
      button.primary{
        border:0;
        background:linear-gradient(135deg, var(--primary), var(--primary2));
        color:white;
        box-shadow:0 12px 26px color-mix(in srgb, var(--primary) 28%, transparent);
      }
      button.linkBtn{ padding:8px 12px; font-size:13px; background:rgba(8,17,27,.48); color:#eff6ff; border-color:rgba(255,255,255,.18); }
      .panel{ background:var(--panel); border:1px solid rgba(255,255,255,.09); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
      .home{ position:relative; min-height:clamp(620px, 82vh, 940px); background:#08111b; }
      .heroText{
        position:absolute;
        left:clamp(22px, 4vw, 56px);
        bottom:clamp(22px, 5vh, 48px);
        z-index:2;
        width:min(620px, calc(100% - 44px));
        padding:26px 26px 24px;
        border-radius:28px;
        border:1px solid rgba(255,255,255,.10);
        background:linear-gradient(180deg, rgba(6,12,21,.18), rgba(6,12,21,.42) 44%, rgba(6,12,21,.72));
        backdrop-filter:blur(22px);
        box-shadow:0 22px 62px rgba(0,0,0,.32);
      }
      .pill{
        display:inline-flex;
        align-items:center;
        gap:8px;
        font-size:12px;
        color:rgba(247,250,255,.88);
        padding:7px 12px;
        border:1px solid rgba(255,255,255,.14);
        border-radius:999px;
        background:rgba(8,17,27,.48);
        backdrop-filter:blur(18px);
      }
      .heroTitle{
        font-family:var(--display-font);
        font-size:min(clamp(36px, 5vw, 78px), var(--hero-title-size, 78px));
        line-height:.98;
        margin:18px 0 14px;
        letter-spacing:0;
        color:#f8fbff;
        text-shadow:0 14px 34px rgba(0,0,0,.34);
        text-wrap:balance;
        max-width:min(var(--hero-title-measure, 12ch), 100%);
        overflow-wrap:anywhere;
      }
      .heroLead{
        color:rgba(244,248,255,.92);
        line-height:1.82;
        margin:0;
        max-width:42ch;
        font-size:15px;
        text-shadow:0 6px 20px rgba(0,0,0,.20);
      }
      .heroBtns{ display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
      .heroBtns button{
        color:#f6fbff;
        background:rgba(8,17,27,.52);
        border-color:rgba(255,255,255,.16);
        backdrop-filter:blur(18px);
      }
      .heroBtns button:hover{
        background:rgba(8,17,27,.64);
        border-color:rgba(255,255,255,.24);
      }
      .heroBtns button.primary{
        border:0;
        background:linear-gradient(135deg, var(--primary), var(--primary2));
        color:white;
      }
      .posterWrap{
        position:relative;
        min-height:clamp(620px, 82vh, 920px);
        background:#05070b;
        overflow:hidden;
        border-top:0;
      }
      .posterWrap::after{
        content:"";
        position:absolute;
        inset:0;
        background:
          linear-gradient(90deg, rgba(8,17,27,.86) 0%, rgba(8,17,27,.58) 30%, rgba(8,17,27,.18) 60%, rgba(8,17,27,.22) 100%),
          linear-gradient(0deg, rgba(8,17,27,.64) 0%, rgba(8,17,27,.10) 34%, rgba(8,17,27,0) 52%);
        pointer-events:none;
      }
      .posterWrap.landscape{ aspect-ratio:auto; }
      .posterWrap.portrait{
        aspect-ratio:auto;
        width:min(540px, calc(100vw - 28px));
        max-height:none;
        margin:0 auto;
      }
      .posterWrap img{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
      .posterFallback{
        min-height:clamp(540px, 76vh, 860px);
        display:grid;
        place-items:center;
        text-align:center;
        padding:24px;
        color:rgba(244,248,255,.82);
      }
      .posterFallback .big{ color:#f8fbff; font-size:34px; font-weight:950; margin-bottom:8px; }
      .playView{
        display:none;
        background:linear-gradient(180deg, rgba(14,20,31,.96), rgba(9,14,24,.98));
        border-color:rgba(255,255,255,.08);
      }
      .videoWrap{ background:#000; border-radius:0; overflow:hidden; border-bottom:1px solid rgba(255,255,255,.09); }
      .videoWrap.landscape{ aspect-ratio:16/9; }
      .videoWrap.portrait{ aspect-ratio:9/16; max-height:76vh; width:min(430px,100%); margin:0 auto; border-left:1px solid rgba(255,255,255,.08); border-right:1px solid rgba(255,255,255,.08); }
      video{ width:100%; height:100%; object-fit:contain; display:block; background:#000; }
      .nodeBody{
        padding:24px 24px 28px;
        background:
          radial-gradient(620px 280px at 100% 0%, rgba(47,163,107,.08), transparent 64%),
          linear-gradient(180deg, rgba(15,22,34,.88), rgba(11,17,27,.98));
      }
      .nodeMeta{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; color:#d4e0ef; font-size:12px; margin-bottom:10px; }
      .nodeMeta span{
        display:inline-flex;
        align-items:center;
        padding:6px 10px;
        border-radius:999px;
        background:rgba(255,255,255,.05);
        border:1px solid rgba(255,255,255,.10);
      }
      .nodeTitle{ font-size:clamp(28px, 3vw, 40px); font-weight:950; line-height:1.08; margin:0 0 10px; color:#f8fbff; }
      .nodeDesc{ color:#dbe6f2; line-height:1.78; margin:0; font-size:18px; max-width:68ch; }
      .captionCard{
        margin-top:18px;
        border:1px solid rgba(255,255,255,.08);
        border-radius:18px;
        background:rgba(255,255,255,.04);
        overflow:hidden;
      }
      .sectionEyebrow{
        padding:14px 16px 0;
        font-size:12px;
        font-weight:800;
        letter-spacing:.08em;
        color:#aebfd6;
      }
      .caption{
        margin-top:0;
        padding:12px 16px 16px;
        line-height:1.88;
        white-space:pre-wrap;
        background:none;
        border:0;
        border-radius:0;
        color:#f3f7fd;
        font-size:17px;
      }
      .choicesPanel{
        display:none;
        margin-top:20px;
        padding:18px;
        border-radius:20px;
        border:1px solid rgba(255,255,255,.10);
        background:
          radial-gradient(520px 240px at 0% 0%, rgba(47,163,107,.10), transparent 60%),
          linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      }
      .choicesPanel.visible{ display:block; }
      .choicesLabel{ font-size:19px; font-weight:900; color:#f8fbff; }
      .choicesHint{ margin-top:6px; font-size:14px; line-height:1.6; color:#bfd0e2; }
      .choices{
        display:grid;
        gap:12px;
        margin-top:16px;
      }
      .choices:empty{ display:none; }
      .choices button{
        width:100%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        text-align:left;
        padding:16px 18px;
        border-radius:16px;
        border:1px solid rgba(255,255,255,.12);
        background:rgba(255,255,255,.06);
        font-size:16px;
        font-weight:900;
      }
      .choices button::after{
        content:"进入";
        flex:0 0 auto;
        font-size:12px;
        font-weight:800;
        color:#d9e9fb;
        opacity:.86;
      }
      .nodeBtns{ display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
      .nodeBtns button{ background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.10); }
      .endingImg{ margin-top:14px; width:100%; border-radius:14px; border:1px solid rgba(255,255,255,.10); display:none; }
      .status{ margin-top:12px; color:#bacee2; font-size:13px; display:none; }
      .modalMask{ display:none; position:fixed; inset:0; z-index:20; background:rgba(0,0,0,.68); padding:20px; overflow:auto; }
      .modal{
        width:min(1360px,100%);
        margin:34px auto;
        background:
          radial-gradient(780px 420px at 0% 0%, rgba(47,163,107,.12), transparent 62%),
          linear-gradient(180deg, var(--overlay-panel), var(--overlay-bg));
        border:1px solid rgba(255,255,255,.12);
        border-radius:22px;
        box-shadow:var(--shadow);
        overflow:hidden;
      }
      .modalHead{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        padding:18px 20px;
        border-bottom:1px solid rgba(255,255,255,.08);
      }
      .modalTitle{ font-weight:950; font-size:22px; color:var(--overlay-text); }
      .modalBody{ padding:20px; max-height:min(78vh, 860px); overflow:auto; }
      .modal .linkBtn{
        color:var(--overlay-text);
        background:rgba(255,255,255,.04);
        border-color:rgba(255,255,255,.10);
      }
      .modal .linkBtn:hover{
        background:rgba(255,255,255,.08);
        border-color:rgba(255,255,255,.18);
      }
      .mapOverviewStage{ display:flex; justify-content:center; padding:4px 0 20px; }
      .mapOverviewFrame{
        width:min(100%, 1240px);
        border:1px solid rgba(255,255,255,.08);
        border-radius:24px;
        background:rgba(255,255,255,.04);
        overflow:hidden;
        box-shadow:0 18px 46px rgba(0,0,0,.22);
      }
      .mapOverviewImage{
        display:block;
        width:100%;
        height:auto;
        background:#0d1420;
      }
      .mapOverviewFallback{
        display:none;
        min-height:340px;
        place-items:center;
        padding:28px;
        text-align:center;
        color:var(--overlay-muted);
        line-height:1.8;
      }
      .mapJumpPanel{
        width:min(100%, 1240px);
        margin:0 auto;
        border:1px solid rgba(255,255,255,.08);
        border-radius:20px;
        background:rgba(255,255,255,.04);
        overflow:hidden;
      }
      .mapJumpHead{
        padding:16px 18px 14px;
        border-bottom:1px solid rgba(255,255,255,.08);
      }
      .mapJumpTitle{ font-size:18px; font-weight:900; color:var(--overlay-text); }
      .mapJumpSub{ margin-top:6px; color:var(--overlay-muted); font-size:13px; line-height:1.6; }
      .mapJumpList{
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
        gap:12px;
        padding:16px;
      }
      .mapJumpBtn{
        text-align:left;
        border:1px solid rgba(255,255,255,.10);
        border-radius:16px;
        background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
        padding:14px 16px;
        color:var(--overlay-text);
      }
      .mapJumpBtn:hover{
        border-color:rgba(255,255,255,.18);
        background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      }
      .mapJumpBtn.current{
        border-color:color-mix(in srgb, var(--primary) 44%, rgba(255,255,255,.10));
        background:linear-gradient(180deg, color-mix(in srgb, var(--primary) 14%, rgba(255,255,255,.06)), rgba(255,255,255,.03));
      }
      .mapJumpTop{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
      .mapJumpName{ font-size:17px; font-weight:900; line-height:1.3; color:var(--overlay-text); }
      .mapJumpMeta{
        display:inline-flex;
        align-items:center;
        padding:5px 8px;
        border-radius:999px;
        border:1px solid rgba(255,255,255,.12);
        background:rgba(255,255,255,.06);
        color:var(--overlay-text);
        font-size:11px;
        font-weight:800;
      }
      .mapJumpDesc{ margin-top:10px; color:var(--overlay-muted); font-size:13px; line-height:1.65; }
      .introText{ white-space:pre-wrap; color:var(--muted); line-height:1.8; }
      .introKpis{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
      .introKpis span{ font-size:12px; color:var(--muted); border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.18); border-radius:999px; padding:6px 9px; }
      .introActions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
      body[data-stage="home"] .topbar{
        position:relative;
        z-index:4;
        margin:0 0 -62px;
        padding:0 18px;
      }
      body[data-stage="home"] .brand{
        opacity:0;
        transform:translateY(-6px);
        pointer-events:none;
      }
      body[data-stage="home"] .actions .linkBtn{
        color:#eef6ff;
        background:rgba(8,17,27,.56);
        border-color:rgba(255,255,255,.18);
        box-shadow:0 10px 28px rgba(0,0,0,.16);
      }
      body[data-stage="home"] .actions .linkBtn:hover{
        background:rgba(14,24,38,.78);
      }
      body[data-stage="play"],
      body[data-stage="ending"]{
        background:
          radial-gradient(980px 520px at 10% 0%, rgba(47,163,107,.10), transparent 68%),
          radial-gradient(860px 480px at 88% 8%, rgba(242,140,40,.10), transparent 70%),
          #071018;
      }
      body[data-stage="play"] .brandTitle,
      body[data-stage="ending"] .brandTitle{ color:#f7fbff; }
      body[data-stage="play"] .brandSub,
      body[data-stage="ending"] .brandSub{ color:#b7c8dc; }
      @media (max-width: 760px){
        .home{ min-height:620px; }
        .heroText{
          left:18px;
          right:18px;
          bottom:18px;
          width:auto;
          padding:22px 18px 18px;
        }
        .heroTitle{
          font-size:min(clamp(32px, 11.8vw, 52px), var(--hero-title-size, 52px));
          max-width:100%;
        }
        .heroLead{ max-width:none; }
        .posterWrap, .posterFallback{ min-height:620px; }
        .nodeBody{ padding:20px 16px 24px; }
        .nodeDesc{ font-size:16px; }
        .caption{ font-size:16px; }
        body[data-stage="home"] .topbar{
          padding:0 14px;
          margin:0 0 -54px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="brand">
          <div class="brandTitle">__TITLE__</div>
          <div class="brandSub">__TAGLINE__</div>
        </div>
        <div class="actions">
          <button class="linkBtn" id="btnSound" type="button">开旁白</button>
          <button class="linkBtn" id="btnMap" type="button">地图</button>
        </div>
      </div>

      <section class="panel home" id="home">
        <div class="heroText">
          <div class="pill" id="pill">离线可玩 · HTML 单文件</div>
          <h1 class="heroTitle" id="heroTitle">__TITLE__</h1>
          <p class="heroLead" id="heroLead">__SYNOPSIS__</p>
          <div class="heroBtns">
            <button class="primary" id="btnStart" type="button">开始</button>
            <button id="btnJump" type="button">选择章节</button>
          </div>
        </div>
        <div class="posterWrap landscape" id="posterWrap">
          <img id="startPoster" alt="游戏海报" style="display:none;" />
          <div class="posterFallback" id="posterFallback">
            <div>
              <div class="big">IP-GAME</div>
              <div>等待海报素材</div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel playView" id="play">
        <div class="videoWrap landscape" id="videoWrap">
          <video id="video" controls playsinline preload="auto"></video>
        </div>
        <div class="nodeBody">
          <div class="nodeMeta">
            <span id="nodeId"></span>
            <span id="nodeType"></span>
          </div>
          <h2 class="nodeTitle" id="nodeTitle"></h2>
          <p class="nodeDesc" id="nodeDesc"></p>
          <div class="captionCard">
            <div class="sectionEyebrow">旁白与对白</div>
            <div class="caption" id="caption"></div>
          </div>
          <div class="status" id="status"></div>
          <img id="endingImg" class="endingImg" alt="结局图" />
          <div class="choicesPanel" id="choicesPanel">
            <div class="choicesLabel">选择下一步</div>
            <div class="choicesHint" id="choicesHint">视频播放完成后，从下面选择你要进入的剧情分支。</div>
            <div class="choices" id="choices"></div>
          </div>
          <div class="nodeBtns">
            <button id="btnReplayNode" type="button">重新播放本段</button>
            <button id="btnBackHome" type="button">回到开场</button>
          </div>
        </div>
      </section>

      <section class="panel playView" id="ending">
        <div class="nodeBody">
          <h2 class="nodeTitle" id="endingTitle"></h2>
          <div class="caption" id="endingText"></div>
          <img id="endingFinalImg" class="endingImg" alt="结局图" />
          <div class="nodeBtns">
            <button class="primary" id="btnRestart" type="button">回到开场</button>
            <button id="btnReplay" type="button">重播结局</button>
          </div>
        </div>
      </section>
    </div>

    <div class="modalMask" id="mapMask" aria-hidden="true">
      <div class="modal">
        <div class="modalHead">
          <div class="modalTitle">章节地图</div>
          <button class="linkBtn" id="mapClose" type="button">关闭</button>
        </div>
        <div class="modalBody">
          <div class="mapOverviewStage">
            <div class="mapOverviewFrame">
              <img class="mapOverviewImage" id="mapOverviewImage" alt="游戏路径全览图" style="display:none;" />
              <div class="mapOverviewFallback" id="mapOverviewFallback">当前项目还没有地图全览图。生成后这里会放大展示。</div>
            </div>
          </div>
          <div class="mapJumpPanel">
            <div class="mapJumpHead">
              <div class="mapJumpTitle">章节跳转</div>
              <div class="mapJumpSub">先看上面的全览地图，再从下面直接跳到你想试玩的节点。</div>
            </div>
            <div class="mapJumpList" id="mapButtons"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modalMask" id="introMask" aria-hidden="true">
      <div class="modal">
        <div class="modalHead">
          <div class="modalTitle" id="introTitle">新手引导</div>
          <button class="linkBtn" id="introClose" type="button">我知道了</button>
        </div>
        <div class="modalBody">
          <div class="introText" id="introText">先播放当前节点视频，播放结束后选择分支。</div>
          <div class="introKpis" id="introKpis"></div>
          <div class="introActions">
            <button class="primary" id="introContinue" type="button">直接开始</button>
            <button id="introOpenMap" type="button">打开地图</button>
          </div>
        </div>
      </div>
    </div>

    <script id="__STORY__" type="application/json">__STORY_JSON__</script>
    <script id="__UI__" type="application/json">__UI_CONFIG_JSON__</script>
    <script>
      const story = JSON.parse(document.getElementById('__STORY__').textContent);
      const ui = JSON.parse(document.getElementById('__UI__').textContent || '{}');
      const meta = story.meta || {};
      const q = meta.questionnaire || {};
      const theme = ui.theme || {};
      const colors = theme.colors || {};
      const features = ui.features || {};
      const copy = ui.copy || {};
      const layout = ui.layout || {};

      const el = {
        home: document.getElementById('home'),
        play: document.getElementById('play'),
        ending: document.getElementById('ending'),
        pill: document.getElementById('pill'),
        posterWrap: document.getElementById('posterWrap'),
        startPoster: document.getElementById('startPoster'),
        posterFallback: document.getElementById('posterFallback'),
        videoWrap: document.getElementById('videoWrap'),
        video: document.getElementById('video'),
        nodeId: document.getElementById('nodeId'),
        nodeType: document.getElementById('nodeType'),
        nodeTitle: document.getElementById('nodeTitle'),
        nodeDesc: document.getElementById('nodeDesc'),
        caption: document.getElementById('caption'),
        status: document.getElementById('status'),
        choices: document.getElementById('choices'),
        endingImg: document.getElementById('endingImg'),
        endingFinalImg: document.getElementById('endingFinalImg'),
        endingTitle: document.getElementById('endingTitle'),
        endingText: document.getElementById('endingText'),
        mapMask: document.getElementById('mapMask'),
        mapOverviewImage: document.getElementById('mapOverviewImage'),
        mapOverviewFallback: document.getElementById('mapOverviewFallback'),
        mapButtons: document.getElementById('mapButtons'),
        introMask: document.getElementById('introMask'),
        introTitle: document.getElementById('introTitle'),
        introText: document.getElementById('introText'),
        introKpis: document.getElementById('introKpis'),
        btnSound: document.getElementById('btnSound'),
        heroTitle: document.getElementById('heroTitle'),
        heroLead: document.getElementById('heroLead'),
        brandSub: document.querySelector('.brandSub'),
        choicesPanel: document.getElementById('choicesPanel'),
        choicesHint: document.getElementById('choicesHint')
      };

      for (const key of ['bg','panel','text','muted','primary','primary2','danger']) {
        if (colors[key]) document.documentElement.style.setProperty('--' + key, colors[key]);
      }
      if (layout.maxWidth) document.documentElement.style.setProperty('--maxw', layout.maxWidth + 'px');
      if (copy.pill) el.pill.textContent = copy.pill;

      const nodeMap = new Map((story.nodes || []).map(n => [String(n.id), n]));
      const startId = story.startNodeId || ((story.nodes || [])[0] || {}).id;
      const storeKey = 'ip-game:' + (meta.title || 'untitled') + ':';
      const aspect = layout.videoAspectRatio || q.aspect_ratio || '横版16:9';
      const isPortrait = String(aspect).includes('9:16');
      const state = { currentNodeId: null, soundOn: false, choicesShown: false };

      function setArClass(target){
        target.classList.toggle('portrait', isPortrait);
        target.classList.toggle('landscape', !isPortrait);
      }
      setArClass(el.posterWrap);
      setArClass(el.videoWrap);

      function rel(relPath){ return relPath || ''; }
      function show(mask){ mask.style.display = 'block'; mask.setAttribute('aria-hidden','false'); }
      function hide(mask){ mask.style.display = 'none'; mask.setAttribute('aria-hidden','true'); }
      function setStage(stage){
        document.body.dataset.stage = stage;
        el.home.style.display = stage === 'home' ? '' : 'none';
        el.play.style.display = stage === 'play' ? 'block' : 'none';
        el.ending.style.display = stage === 'ending' ? 'block' : 'none';
      }
      function normalizeText(text){
        return String(text || '').replace(/\\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
      }
      function captionFor(n){
        return [normalizeText(n.narration), normalizeText(n.dialogue)].filter(Boolean).join('\n\n') || '（本节点暂无旁白文本）';
      }
      function speak(text){
        if (!state.soundOn || !('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN';
        u.rate = 1;
        window.speechSynthesis.speak(u);
      }

      function setupPoster(){
        const first = nodeMap.get(String(startId)) || (story.nodes || [])[0] || {};
        const firstMedia = first.media || {};
        const poster = meta.poster || firstMedia.poster || firstMedia.sceneImage || firstMedia.endingImage;
        if (!poster) return;
        el.startPoster.src = rel(poster);
        el.startPoster.style.display = 'block';
        el.posterFallback.style.display = 'none';
        el.startPoster.onerror = () => {
          el.startPoster.style.display = 'none';
          el.posterFallback.style.display = 'grid';
        };
      }

      function shortText(text, limit = 74){
        const raw = normalizeText(text).replace(/\s+/g, ' ').trim();
        if (!raw) return '';
        return raw.length > limit ? raw.slice(0, limit - 1) + '…' : raw;
      }

      function clampTitle(title, lines = 2, lineLength = 8){
        const chars = Array.from(String(title || '').trim());
        if (!chars.length) return ['未命名节点'];
        const max = lines * lineLength;
        const clipped = chars.length > max ? chars.slice(0, max - 1).concat('…') : chars;
        const result = [];
        for (let i = 0; i < clipped.length; i += lineLength) {
          result.push(clipped.slice(i, i + lineLength).join(''));
        }
        return result.slice(0, lines);
      }

      function fitHeroTitle(){
        const text = String(el.heroTitle.textContent || '').trim();
        const length = Array.from(text).length;
        let size = 78;
        let measure = '12ch';
        if (length > 10) size = 70;
        if (length > 16) { size = 62; measure = '14ch'; }
        if (length > 24) { size = 54; measure = '16ch'; }
        if (length > 34) { size = 46; measure = '18ch'; }
        el.heroTitle.style.setProperty('--hero-title-size', size + 'px');
        el.heroTitle.style.setProperty('--hero-title-measure', measure);
      }

      function buildFlowOrder(){
        const visited = new Set();
        const ordered = [];
        function walk(nodeId, depth = 0, viaText = ''){
          const key = String(nodeId || '');
          if (!key || visited.has(key)) return;
          const node = nodeMap.get(key);
          if (!node) return;
          visited.add(key);
          ordered.push({ node, depth, viaText });
          for (const choice of (node.choices || [])) {
            walk(choice.to, depth + 1, choice.text || '');
          }
        }
        walk(startId, 0, '');
        for (const node of (story.nodes || [])) {
          const key = String(node.id || '');
          if (key && !visited.has(key)) ordered.push({ node, depth: 0, viaText: '' });
        }
        return ordered;
      }

      function renderMap(){
        const mapImage = rel(meta.mapOverviewImage || '');
        const showMapFallback = () => {
          el.mapOverviewImage.style.display = 'none';
          el.mapOverviewFallback.style.display = 'grid';
        };
        const showMapImage = () => {
          el.mapOverviewImage.style.display = 'block';
          el.mapOverviewFallback.style.display = 'none';
        };

        if (mapImage) {
          el.mapOverviewImage.onload = showMapImage;
          el.mapOverviewImage.onerror = showMapFallback;
          el.mapOverviewImage.src = mapImage;
          if (el.mapOverviewImage.complete && el.mapOverviewImage.naturalWidth > 0) {
            showMapImage();
          }
        } else {
          showMapFallback();
        }

        el.mapButtons.innerHTML = '';
        for (const item of buildFlowOrder()) {
          const n = item.node;
          const choices = n.choices || [];
          const b = document.createElement('button');
          b.className = 'mapJumpBtn' + (state.currentNodeId === n.id ? ' current' : '');
          b.type = 'button';

          const top = document.createElement('div');
          top.className = 'mapJumpTop';

          const name = document.createElement('div');
          name.className = 'mapJumpName';
          name.textContent = `${n.id} · ${n.title || n.id}`;

          const badge = document.createElement('div');
          badge.className = 'mapJumpMeta';
          badge.textContent = n.id === startId ? '起点' : (n.isEnding ? '结局' : '剧情');

          top.appendChild(name);
          top.appendChild(badge);
          b.appendChild(top);

          const desc = document.createElement('div');
          desc.className = 'mapJumpDesc';
          const lead = item.depth && item.viaText ? `由「${item.viaText}」进入` : (n.id === startId ? '故事起点' : '');
          const summary = shortText(n.description || n.endingText || captionFor(n), 72);
          const suffix = n.isEnding ? '终局节点' : `${choices.length} 个选择`;
          desc.textContent = [lead, summary, suffix].filter(Boolean).join(' · ');
          b.appendChild(desc);

          b.onclick = () => { hide(el.mapMask); playNode(n.id); };
          el.mapButtons.appendChild(b);
        }
      }

      function renderChoices(n){
        state.choicesShown = true;
        el.choicesPanel.classList.add('visible');
        el.choicesHint.textContent = '点击下面的按钮进入下一段剧情。';
        el.choices.innerHTML = '';
        for (const c of (n.choices || [])) {
          const b = document.createElement('button');
          b.textContent = c.text || c.to;
          b.onclick = () => playNode(c.to);
          el.choices.appendChild(b);
        }
      }

      function showStatus(text){
        el.status.textContent = text || '';
        el.status.style.display = text ? 'block' : 'none';
      }

      function playNode(nodeId){
        const n = nodeMap.get(String(nodeId));
        if (!n) { alert('节点不存在：' + nodeId); return; }
        state.currentNodeId = n.id;
        state.choicesShown = false;
        try { localStorage.setItem(storeKey + 'lastNode', n.id); } catch (_) {}
        setStage('play');
        showStatus('');
        el.choices.innerHTML = '';
        el.choicesPanel.classList.remove('visible');
        el.endingImg.style.display = 'none';
        el.endingImg.removeAttribute('src');
        el.nodeId.textContent = n.id || '';
        el.nodeType.textContent = n.isEnding ? '结局' : '剧情节点';
        el.nodeTitle.textContent = n.title || n.id;
        el.nodeDesc.textContent = normalizeText(n.description);
        const cap = captionFor(n);
        el.caption.textContent = cap;
        speak(cap);

        const media = n.media || {};
        const video = rel(media.video);
        const poster = rel(media.poster || media.sceneImage || media.endingImage);
        if (poster) el.video.setAttribute('poster', poster); else el.video.removeAttribute('poster');
        if (video) {
          el.video.src = video;
          el.video.load();
          showStatus('视频播放结束后会显示选项。');
          const playPromise = el.video.play();
          if (playPromise && typeof playPromise.catch === 'function') {
            playPromise.catch(() => {
                if (n.isEnding) {
                  showStatus('浏览器未允许自动播放，可点击视频播放，也可直接查看结局。');
                  showEnding(n);
                } else {
                  showStatus('浏览器未允许自动播放。你可以点击视频继续播放，或者直接选择下面的分支。');
                  if (!state.choicesShown) renderChoices(n);
                }
              });
            }
        } else {
          el.video.removeAttribute('src');
          el.video.load();
          if (n.isEnding) {
            showStatus('本结局未配置视频，已直接显示结局。');
            showEnding(n);
          } else {
            showStatus('本节点未配置视频，已直接显示分支选择。');
            renderChoices(n);
          }
        }

        if (n.isEnding) {
          if (media.endingImage) {
            el.endingImg.src = rel(media.endingImage);
            el.endingImg.style.display = 'block';
          }
          if (n.endingText) el.caption.textContent = normalizeText(n.endingText);
        }

        el.video.onended = () => {
          showStatus('');
          if (!n.isEnding) renderChoices(n);
          else showEnding(n);
        };
        el.video.onerror = () => {
          showStatus('视频缺失或无法播放，已进入可选分支。');
          if (!n.isEnding) renderChoices(n);
          else showEnding(n);
        };
      }

      function showEnding(n){
        const media = n.media || {};
        el.endingTitle.textContent = n.title || '结局';
        el.endingText.textContent = normalizeText(n.endingText) || captionFor(n);
        const img = rel(media.endingImage || media.poster || media.sceneImage);
        if (img) {
          el.endingFinalImg.src = img;
          el.endingFinalImg.style.display = 'block';
        } else {
          el.endingFinalImg.removeAttribute('src');
          el.endingFinalImg.style.display = 'none';
        }
        setStage('ending');
      }

      function setupIntro(){
        el.introTitle.textContent = copy.introTitle || '新手引导';
        el.introText.textContent = normalizeText(copy.introBody) || '先播放当前节点视频，播放结束后选择分支。任何时候都可以打开地图跳转章节。';
        el.introKpis.innerHTML = '';
        for (const s of (copy.introKpis || ['支持分支跳转','支持章节跳转','缺素材不崩'])) {
          const span = document.createElement('span');
          span.textContent = s;
          el.introKpis.appendChild(span);
        }
        if (features.showIntroOnce === false) return;
        try {
          if (!localStorage.getItem(storeKey + 'introSeen')) show(el.introMask);
        } catch (_) {
          show(el.introMask);
        }
      }

      document.getElementById('btnStart').onclick = () => playNode(startId);
      document.getElementById('btnJump').onclick = () => { renderMap(); show(el.mapMask); };
      document.getElementById('btnMap').onclick = () => { renderMap(); show(el.mapMask); };
      document.getElementById('btnBackHome').onclick = () => setStage('home');
      document.getElementById('btnReplayNode').onclick = () => state.currentNodeId && playNode(state.currentNodeId);
      document.getElementById('btnRestart').onclick = () => { setStage('home'); };
      document.getElementById('btnReplay').onclick = () => state.currentNodeId && playNode(state.currentNodeId);
      document.getElementById('mapClose').onclick = () => hide(el.mapMask);
      document.getElementById('introClose').onclick = () => { try { localStorage.setItem(storeKey + 'introSeen','1'); } catch (_) {} hide(el.introMask); };
      document.getElementById('introContinue').onclick = () => { try { localStorage.setItem(storeKey + 'introSeen','1'); } catch (_) {} hide(el.introMask); playNode(startId); };
      document.getElementById('introOpenMap').onclick = () => { try { localStorage.setItem(storeKey + 'introSeen','1'); } catch (_) {} hide(el.introMask); renderMap(); show(el.mapMask); };
      el.btnSound.onclick = () => {
        state.soundOn = !state.soundOn;
        el.btnSound.textContent = state.soundOn ? '关旁白' : '开旁白';
        if (!state.soundOn && 'speechSynthesis' in window) window.speechSynthesis.cancel();
        if (state.soundOn && state.currentNodeId) {
          const n = nodeMap.get(String(state.currentNodeId));
          if (n) speak(captionFor(n));
        }
      };
      if (features.showSoundButton === false) el.btnSound.style.display = 'none';
      if (features.showMapButton === false) document.getElementById('btnMap').style.display = 'none';
      if (features.showChapterButton === false) document.getElementById('btnJump').style.display = 'none';

      setupPoster();
      const heroLead = normalizeText(el.heroLead.textContent) || normalizeText(el.brandSub.textContent);
      if (heroLead) {
        el.heroLead.textContent = heroLead;
      } else {
        el.heroLead.style.display = 'none';
      }
      fitHeroTitle();
      setStage('home');
      setupIntro();
    </script>
  </body>
</html>
